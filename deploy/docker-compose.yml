version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: stagespro_app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-stagespro}
      - DB_USERNAME=${DB_USERNAME:-stagespro}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - stagespro_net

  db:
    image: mysql:8.0
    container_name: stagespro_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-stagespro}
      MYSQL_USER: ${DB_USERNAME:-stagespro}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - stagespro_net

  redis:
    image: redis:7-alpine
    container_name: stagespro_redis
    restart: unless-stopped
    networks:
      - stagespro_net

volumes:
  db_data:
  app_storage:
  app_logs:

networks:
  stagespro_net:
    driver: bridge
