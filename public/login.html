<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion – StagesPro Cameroun</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>body{font-family:'Inter',sans-serif;} .hero-bg{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#065f46 100%);}</style>
</head>
<body class="hero-bg min-h-screen flex items-center justify-center p-4" x-data="{showPass:false, role:'stagiaire'}">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg">
          <i class="fas fa-laptop-code text-white text-lg"></i>
        </div>
        <span class="text-white font-black text-2xl">StagesPro<span class="text-emerald-400">CM</span></span>
      </a>
      <p class="text-slate-400 text-sm mt-2">Programme de stages en informatique</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
      <!-- Tabs -->
      <div class="grid grid-cols-3 border-b border-slate-100">
        <button @click="role='stagiaire'"
                :class="role==='stagiaire' ? 'bg-emerald-50 text-emerald-700 border-b-2 border-emerald-500' : 'text-slate-500 hover:text-slate-700'"
                class="py-4 text-xs font-semibold transition text-center">
          <i class="fas fa-user-graduate block text-lg mb-1"></i>Stagiaire
        </button>
        <button @click="role='encadreur'"
                :class="role==='encadreur' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-500' : 'text-slate-500 hover:text-slate-700'"
                class="py-4 text-xs font-semibold transition text-center">
          <i class="fas fa-chalkboard-teacher block text-lg mb-1"></i>Encadreur
        </button>
        <button @click="role='admin'"
                :class="role==='admin' ? 'bg-purple-50 text-purple-700 border-b-2 border-purple-500' : 'text-slate-500 hover:text-slate-700'"
                class="py-4 text-xs font-semibold transition text-center">
          <i class="fas fa-shield-alt block text-lg mb-1"></i>Admin
        </button>
      </div>

      <div class="p-8">
        <h2 class="font-black text-slate-800 text-xl mb-1">
          Bienvenue<span x-show="role==='stagiaire'"> stagiaire 👋</span>
          <span x-show="role==='encadreur'"> encadreur 👨‍🏫</span>
          <span x-show="role==='admin'"> coordinateur 🛡️</span>
        </h2>
        <p class="text-slate-500 text-sm mb-6">Connectez-vous à votre espace personnel</p>

        <form>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">Adresse email</label>
              <div class="relative">
                <i class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="email" placeholder="votre@email.com"
                       class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"/>
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1.5">Mot de passe</label>
              <div class="relative">
                <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input :type="showPass ? 'text' : 'password'" placeholder="••••••••"
                       class="w-full border border-slate-200 rounded-xl pl-10 pr-12 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"/>
                <button type="button" @click="showPass=!showPass"
                        class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                  <i :class="showPass ? 'fa-eye-slash' : 'fa-eye'" class="fas text-sm"></i>
                </button>
              </div>
            </div>
            <div class="flex items-center justify-between">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="w-4 h-4 rounded text-emerald-500"/>
                <span class="text-sm text-slate-500">Se souvenir de moi</span>
              </label>
              <a href="#" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium">Mot de passe oublié ?</a>
            </div>
          </div>

          <!-- Submit -->
          <div class="mt-6">
            <a x-show="role==='stagiaire'" href="dashboard-stagiaire.html"
               class="block w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3.5 rounded-xl font-bold text-center text-sm transition shadow-lg shadow-emerald-500/30">
              <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
            </a>
            <a x-show="role==='encadreur'" href="dashboard-encadreur.html"
               class="block w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold text-center text-sm transition shadow-lg shadow-blue-500/30">
              <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
            </a>
            <a x-show="role==='admin'" href="dashboard-admin.html"
               class="block w-full bg-purple-600 hover:bg-purple-700 text-white py-3.5 rounded-xl font-bold text-center text-sm transition shadow-lg shadow-purple-500/30">
              <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
            </a>
          </div>
        </form>

        <p class="text-center text-slate-500 text-sm mt-6">
          Pas encore inscrit ?
          <a href="inscription.html" class="text-emerald-600 font-semibold hover:text-emerald-700">S'inscrire maintenant</a>
        </p>
      </div>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      <a href="index.html" class="hover:text-white transition"><i class="fas fa-arrow-left mr-1"></i>Retour au site</a>
    </p>
  </div>

</body>
</html>
